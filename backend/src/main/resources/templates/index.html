<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>CanaryPets</title>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <link th:href="@{/css/styles.css}" rel="stylesheet">
  <link th:href="@{/css/fragments/header.css}" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

<!--<div th:replace="fragments :: header"></div>-->
<header th:insert="~{fragments :: header}"></header>

<main class="container flex-grow-1">

  <!-- HERO -->
  <div class="mt-4">
    <div class="p-5 bg-light text-center">
      <h1>Todo para tu mascota</h1>
      <p>Descubre los mejores productos para cuidar de ellos</p>
    </div>
  </div>

  <!-- CATEGORÍAS DESTACADAS -->
  <div class="mt-5">
    <h3 class="text-center">Categorías</h3>

    <div class="row justify-content-center g-4">

      <div class="col-6 col-md-3 col-lg-2"> <!--Móvil → 2 por fila / Tablet → 3-4 / Desktop → más compactos-->
        <a th:href="@{/categoria/perros}" class="card p-3 text-center">Perros</a>
      </div>

      <div class="col-6 col-md-3 col-lg-2">
        <a th:href="@{/categoria/gatos}" class="card p-3 text-center">Gatos</a>
      </div>

      <div class="col-6 col-md-3 col-lg-2">
        <a th:href="@{/categoria/roedores}" class="card p-3 text-center">Roedores</a>
      </div>

      <div class="col-6 col-md-3 col-lg-2">
        <a th:href="@{/categoria/peces}" class="card p-3 text-center">Peces</a>
      </div>

      <div class="col-6 col-md-3 col-lg-2">
        <a th:href="@{/categoria/pajaros}" class="card p-3 text-center">Pájaros</a>
      </div>

      <div class="col-6 col-md-3 col-lg-2">
        <a th:href="@{/categoria/reptiles}" class="card p-3 text-center">Reptiles</a>
      </div>

    </div>
  </div>

</main>

<!--<div th:replace="fragments :: footer"></div>-->
<footer th:insert="~{fragments :: footer}"></footer>

<div th:insert="~{fragments :: toast}"></div>

</body>
<script th:src="@{/js/main.js}"></script>
</html>
