<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Discográfica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link th:href="@{/css/fragments/header.css}" rel="stylesheet">
    <link th:href="@{/css/premium/premium_styles.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <header th:insert="~{fragments :: header}"></header>

    <main class="container d-flex justify-content-center align-items-center flex-grow-1" style="min-height: 80vh;">

        <div class="row w-100 justify-content-center" style="max-width: 900px;">

            <!-- 🆓 FREE -->
            <div class="col-md-5 mb-4">
                <div class="card h-100 border-0 shadow-sm text-center p-4">

                    <h2 class="fw-bold">Free</h2>

                    <h3 class="text-muted my-3">0€</h3>

                    <ul class="list-unstyled text-start mb-4">
                        <li>✔️ Acceso a la tienda</li>
                        <li>✔️ Compra de productos</li>
                        <li class="text-muted">❌ Sin descuentos</li>
                        <li class="text-muted">❌ Sin envío prioritario</li>
                    </ul>

                    <button class="btn btn-outline-secondary w-100" disabled>
                        Plan actual
                    </button>

                </div>
            </div>

            <!-- 💎 PREMIUM -->
            <div class="col-md-5 mb-4">
                <div class="card h-100 border-0 shadow-lg text-center p-4 position-relative">

                    <!-- Badge -->
                    <span class="position-absolute top-0 start-50 translate-middle badge bg-warning text-dark px-3 py-2 shadow">
                    RECOMENDADO
                </span>

                    <h2 class="fw-bold mt-3">Premium</h2>

                    <h3 class="text-success my-3">9,99€</h3>
                    <span class="text-muted">/mes</span>

                    <ul class="list-unstyled text-start mb-4 mt-3">
                        <li>✔️ Acceso completo</li>
                        <li>✔️ Compra de productos</li>
                        <li>✅ 10% de descuento</li>
                        <li>🚚 Envío prioritario</li>
                    </ul>

                    <!-- SOLO NO PREMIUM -->
                    <div sec:authorize="!hasRole('PREMIUM')">
                        <form th:action="@{/premium}" method="post">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}" />

                            <button class="btn btn-success btn-lg w-100 shadow">
                                Hacerme Premium
                            </button>
                        </form>
                    </div>

                    <!-- SI YA ES PREMIUM -->
                    <div sec:authorize="hasRole('PREMIUM')">
                        <div class="alert alert-success">
                            Ya tienes este plan 🎉
                        </div>
                    </div>

                </div>
            </div>

        </div>

    </main>

    <footer th:insert="~{fragments :: footer}"></footer>
</body>
</html>
