<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <link th:href="@{/css/fragments/header.css}" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

<!-- HEADER -->
<header th:insert="~{fragments :: header}"></header>

<!-- MAIN -->
<main class="container my-4 flex-grow-1">
    <section class="container py-5 text-center">

        <div class="mb-4">
            <h1 class="fw-bold">¡Compra completada! 🎉</h1>
        </div>

        <div class="card shadow-sm mx-auto" style="max-width: 500px;">
            <div class="card-body">

                <h2 class="h4 mb-3">¡Gracias por tu compra!</h2>

                <p class="text-muted mb-2">
                    Tu pedido: Pedido nº #<strong th:text="${orderId}">123</strong>
                </p>

                <p class="text-muted mb-4">
                    Recibirás un email con los detalles.
                </p>

                <a th:href="@{/}" class="btn btn-success w-100">
                    Ir a la página principal
                </a>

            </div>
        </div>

    </section>
</main>

<!-- FOOTER -->
<footer th:insert="~{fragments :: footer}"></footer>

<div th:insert="~{fragments :: toast}"></div>

</body>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/toast.js}"></script>
</html>
