<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <link th:href="@{/css/fragments/header.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
<header th:insert="~{fragments :: header}"></header>

<!--<main class="container mt-4 px-3 px-md-4 px-lg-5 flex-grow-1"></main>-->
<main class="container mt-4 px-3 px-md-4 px-lg-5 flex-grow-1">
    <h2>Editar producto</h2>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{'/admin/products/edit/' + ${product.id}}"
          th:object="${product}" method="post">

        <div class="row g-3">

            <input type="hidden" name="redirectTo"
                   th:value="${redirectTo != null} ? ${redirectTo} : ${referer}">

            <!-- Nombre -->
            <div class="col-md-6">
                <label>Nombre</label>
                <input type="text" class="form-control" th:field="*{name}">
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('name')}"
                     th:errors="*{name}">
                </div>
            </div>

            <!-- Slug -->
            <div class="col-md-6">
                <label>Slug</label>
                <input type="text" class="form-control" th:field="*{slug}">
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('slug')}"
                     th:errors="*{slug}">
                </div>
            </div>

            <!-- Imagen -->
            <div class="col-md-6">
                <label>Image URL</label>
                <input type="text" class="form-control" th:field="*{imageUrl}">
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('imageUrl')}"
                     th:errors="*{imageUrl}">
                </div>
            </div>

            <!-- Precio -->
            <div class="col-md-3">
                <label>Precio</label>
                <input type="number" step="0.01" class="form-control" th:field="*{price}">
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('price')}"
                     th:errors="*{price}">
                </div>
            </div>

            <!-- Stock -->
            <div class="col-md-3">
                <label>Stock</label>
                <input type="number" class="form-control" th:field="*{stock}">
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('stock')}"
                     th:errors="*{stock}">
                </div>
            </div>

            <!-- Descripción -->
            <div class="col-12">
                <label>Descripción</label>
                <textarea class="form-control" th:field="*{description}"></textarea>
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('description')}"
                     th:errors="*{description}">
                </div>
            </div>

            <!-- Dimensiones -->
            <div class="col-md-6">
                <label>Dimensiones</label>
                <input type="text" class="form-control" th:field="*{dimensions}">
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('dimensions')}"
                     th:errors="*{dimensions}">
                </div>
            </div>

            <!-- Proveedor -->
            <div class="col-md-6">
                <label>Proveedor</label>
                <input type="text" class="form-control" th:field="*{provider}">
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('provider')}"
                     th:errors="*{provider}">
                </div>
            </div>

            <!-- Categoría padre-->
            <!--<div class="col-md-6">
                <label>Categoría</label>
                <select class="form-select" th:field="*{category}">
                    <option th:each="c : ${categories}"
                            th:value="${c.id}"
                            th:text="${c.name}">
                    </option>
                </select>
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('category')}"
                     th:errors="*{category}">
                </div>
            </div>-->
            <div class="col-md-6"> <!-- Aquí no lleva th:field-->
                <label>Categoría padre</label>
                <select name="parentId" class="form-select" onchange="this.form.submit()"><!---->
                    <option value="">Selecciona</option>
                    <option th:each="p : ${parentCategories}"
                            th:value="${p.id}"
                            th:text="${p.name}"
                            th:selected="${p.id == selectedParentId}">
                    </option><!--th:selected="${product.category != null and product.category.parent != null and p.id == product.category.parent.id}"-->
                </select> <!-- Lo anterior funciona solo en carga inicial, pero falla cuando
                            hay error de validación (BindingResult) o se cambia parentId y se recarga-->

                <button type="submit" class="btn btn-outline-secondary mt-2">
                    Aplicar categoría
                </button>
            </div>

            <!--Subcategoría-->
            <div class="col-md-6">
                <label>Subcategoría</label>
                <select class="form-select" th:field="*{category}">
                    <option value="">Selecciona</option>
                    <option th:each="c : ${allCategories}"
                            th:value="${c.id}"
                            th:text="${c.name}">
                    </option> <!-- El th:if="${selectedParentId == null or (c.parent != null and c.parent.id == selectedParentId)}"
                                    también es necesario quitarlo de aquí ya que si no se estaría duplicando lógica y causando bugs raros-->
                </select>
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('category')}"
                     th:errors="*{category}">
                </div>
            </div>

            <!-- Tags -->
            <!--<div class="col-md-6">
                <label>Tags</label>
                <select multiple class="form-select" th:field="*{tags}">
                    <option th:each="t : ${tags}"
                            th:value="${t.id}"
                            th:text="${t.name}">
                    </option>
                </select>
            </div>-->
            <div>
                <label>Tags</label>
                <select multiple class="form-select" th:field="*{tags}">
                    <option th:each="t : ${allTags}"
                            th:value="${t.id}"
                            th:text="${t.name}"
                            th:selected="${selectedTagIds.contains(t.id)}">
                    </option>
                </select>
                <div class="text-danger small"
                     th:if="${#fields.hasErrors('tags')}"
                     th:errors="*{tags}">
                </div>
            </div>


            <!-- Solidario -->
            <div class="col-12 form-check">
                <input type="checkbox" class="form-check-input" th:field="*{solidaryProduct}">
                <label class="form-check-label">Producto solidario</label>
            </div>

        </div>

        <!-- Botones -->
        <div class="mt-4 d-flex justify-content-between">
            <!--<a th:href="{@/}" class="btn btn-secondary">Cancelar</a>-->
            <a th:href="${redirectTo != null and redirectTo != ''} ? ${redirectTo} : '/'" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success">Guardar cambios</button>
        </div>

    </form>
</main>

<footer th:insert="~{fragments :: footer}"></footer>

<div th:insert="~{fragments :: toast}"></div>

</body>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/toast.js}"></script>
</html>
