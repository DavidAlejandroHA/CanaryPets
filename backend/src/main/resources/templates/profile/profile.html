<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<div class="container py-4">

  <!-- Título -->
  <h2 class="mb-4 text-center text-md-start">Mi perfil</h2>

  <div class="row g-4">

    <!-- 🔹 DATOS USUARIO -->
    <div class="col-12 col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body">

          <h5 class="card-title mb-3">Información personal</h5>

          <div class="row g-3">

            <!-- Email -->
            <div class="col-12 col-md-6">
              <label class="form-label text-muted">Email</label>
              <div class="fw-semibold" th:text="${user.email}">email</div>
            </div>

            <!-- Username -->
            <div class="col-12 col-md-6">
              <label class="form-label text-muted">Nombre de usuario</label>
              <div class="fw-semibold" th:text="${user.nickname}">username</div>
            </div>

            <!-- Dirección -->
            <div class="col-12 col-md-6">
              <label class="form-label text-muted">Dirección</label>
              <div class="fw-semibold" th:text="${user.address}">dirección</div>
            </div>

            <!-- Código postal -->
            <div class="col-12 col-md-6">
              <label class="form-label text-muted">Código postal</label>
              <div class="fw-semibold" th:text="${user.postalCode}">código postal</div>
            </div>

            <!-- País -->
            <div class="col-12 col-md-6">
              <label class="form-label text-muted">País</label>
              <div class="fw-semibold" th:text="${user.pais}">pais</div>
            </div>

            <!-- Rol -->
            <div class="col-12 col-md-6">
              <label class="form-label text-muted">Rol</label>
              <div class="fw-semibold">
                  <span class="badge"
                        th:each="role : ${#authentication.authorities}"
                        th:text="${role.authority.replace('ROLE_', '')}"
                        th:classappend="
                        ${role.authority == 'ROLE_ADMIN'} ? ' bg-warning' :
                        (${role.authority == 'ROLE_PREMIUM'} ? ' bg-success text-dark' :
                        ' bg-primary')">Rol
                  </span>
              </div>
            </div>

          </div>

        </div>
      </div>
    </div>

    <!-- 🔹 ACCIONES -->
    <div class="col-12 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-body">

          <h5 class="card-title mb-3">Opciones</h5>

          <div class="d-grid gap-2">

            <!-- Pedidos -->
            <a href="/profile/edit" class="btn btn-outline-secondary">
              Editar perfil
            </a>

            <!-- Pedidos -->
            <a href="/profile/orders" class="btn btn-outline-primary">
              Ver pedidos
            </a>

            <!-- Favoritos -->
            <a href="/profile/favorites" class="btn btn-outline-warning">
              Ver favoritos
            </a>

            <!-- Logout -->
            <form th:action="@{/logout}" method="post">
              <button type="submit" class="btn btn-secondary w-100">
                Cerrar sesión
              </button>
            </form>

          </div>

        </div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
