<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Mis favoritos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link th:href="@{/css/styles.css}" rel="stylesheet">
  <link th:href="@{/css/catalog/product-cards-styles.css}" rel="stylesheet">
  <link th:href="@{/css/fragments/header.css}" rel="stylesheet">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<header th:insert="~{fragments :: header}"></header>

<main class="container py-4 flex-grow-1">

  <!-- TÍTULO -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Mis favoritos</h2>
    <a th:href="@{/profile}" class="btn btn-outline-secondary btn-sm">Volver</a>
  </div>

  <!-- EMPTY STATE -->
  <div th:if="${favoritesPage.empty}" class="text-center py-5">
    <p class="text-muted">No tienes productos favoritos aún</p>
    <a th:href="@{/}" class="btn btn-primary">Explorar productos</a>
  </div>

  <!-- GRID PRODUCTOS -->
  <div class="row g-3" th:if="${!favoritesPage.empty}">
    <div class="col-6 col-md-4 col-lg-3"
         th:each="product : ${favoritesPage.content}">

      <article class="card h-100 product-card position-relative"
               th:attr="data-slug=${product.slug}">

        <!--Favorito-->
        <form class="favorite-form position-absolute top-0 end-0 m-2"
              th:action="@{/profile/favorites/toggle}"
              method="post"
              onclick="event.stopPropagation()">

          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="hidden" name="productId" th:value="${product.id}">

          <button type="submit"
                  class="favorite-btn p-0 bg-transparent"
                  th:data-id="${product.id}"
                  th:classappend="${#lists.contains(favoritesIds, product.id)} ? 'active'">

                            <span class="fav-icon"
                                  th:text="${#lists.contains(favoritesIds, product.id)} ? '❤️' : '🤍'">
                            ❤️
                            </span>

          </button>
        </form>

        <!-- Overlay clickable -->
        <a th:href="@{'/producto/' + ${product.slug}}"
           class="stretched-link"></a>

        <!-- IMAGEN -->
        <header>
          <img th:src="@{'/images/' + ${product.imageUrl}}"
               class="card-img-top product-img"
               alt="Imagen de producto"> <!-- style="height: 180px; object-fit: cover;"-->
        </header>

        <!-- BODY -->
        <div class="card-body d-flex flex-column">
          <h2 class="fs-6" th:text="${product.name}"></h2>

          <small class="text-muted"
                 th:text="${product.getTagValue('marca')}"></small>

          <p class="small text-muted flex-grow-1"
             th:text="${product.description}"></p>

          <strong class="mt-auto"
                  th:text="${product.price + ' €'}"></strong>

          <span th:if="${product.solidaryProduct}"
                class="badge bg-success mt-2 align-self-start">
                        Producto solidario
                    </span>
        </div>

        <!-- FOOTER (ELIMINAR FAVORITO) -->
        <footer class="card-footer bg-white border-0 position-relative" style="z-index: 2;">

          <form class="remove-fav-form"
                th:action="@{/profile/favorites/remove}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="productId" th:value="${product.id}">

            <button type="submit"
                    class="btn btn-outline-danger w-100 remove-fav-btn"
                    th:attr="data-id=${product.id}"> <!--style="z-index: 3; position: relative;"-->
              Eliminar de favoritos
            </button>
          </form>

        </footer>

      </article>
    </div>
  </div>

  <!-- PAGINACIÓN -->
  <nav th:if="${favoritesPage.totalPages > 1}" class="mt-4">
    <ul class="pagination justify-content-center flex-wrap">

      <!-- Primera -->
      <li class="page-item"
          th:classappend="${favoritesPage.first} ? 'disabled'">
        <a class="page-link"
           th:href="@{/profile/favorites(page=0, size=${favoritesPage.size})}">
          Primera
        </a>
      </li>

      <!-- Anterior -->
      <li class="page-item"
          th:classappend="${favoritesPage.first} ? 'disabled'">
        <a class="page-link"
           th:href="@{/profile/favorites(page=${favoritesPage.number - 1}, size=${favoritesPage.size})}">
          Anterior
        </a>
      </li>

      <!-- ... inicio -->
      <li class="page-item"
          th:if="${favoritesPage.number > 2}">
        <span class="page-link">...</span>
      </li>

      <!-- NÚMEROS -->
      <li class="page-item"
          th:each="i : ${#numbers.sequence(
                    T(java.lang.Math).max(0, favoritesPage.number - 2),
                    T(java.lang.Math).min(favoritesPage.totalPages - 1, favoritesPage.number + 2)
                )}"
          th:classappend="${i == favoritesPage.number} ? 'active'">

        <a class="page-link"
           th:href="@{/profile/favorites(page=${i}, size=${favoritesPage.size})}"
           th:text="${i + 1}">
        </a>
      </li>

      <!-- ... final -->
      <li class="page-item"
          th:if="${favoritesPage.number < favoritesPage.totalPages - 3}">
        <span class="page-link">...</span>
      </li>

      <!-- Siguiente -->
      <li class="page-item"
          th:classappend="${favoritesPage.last} ? 'disabled'">
        <a class="page-link"
           th:href="@{/profile/favorites(page=${favoritesPage.number + 1}, size=${favoritesPage.size})}">
          Siguiente
        </a>
      </li>

      <!-- Última -->
      <li class="page-item"
          th:classappend="${favoritesPage.last} ? 'disabled'">
        <a class="page-link"
           th:href="@{/profile/favorites(page=${favoritesPage.totalPages - 1}, size=${favoritesPage.size})}">
          Última
        </a>
      </li>

    </ul>
  </nav>

</main>

<footer th:insert="~{fragments :: footer}"></footer>

<div th:insert="~{fragments :: toast}"></div>

</body>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/catalog.js}"></script>
<script th:src="@{/js/favorites.js}"></script>
<script th:src="@{/js/toast.js}"></script>
</html>
