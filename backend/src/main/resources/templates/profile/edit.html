<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Editar perfil</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link th:href="@{/css/styles.css}" rel="stylesheet">
  <link th:href="@{/css/fragments/header.css}" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<header th:insert="~{fragments :: header}"></header>

<div class="container py-4 flex-grow-1">

  <h2 class="mb-4">Editar perfil</h2>

  <div class="card shadow-sm">
    <div class="card-body">

      <form th:action="@{/profile/edit}" th:object="${profileForm}" method="post">

        <div class="row g-3">

          <!-- Nickname -->
          <div class="col-12 col-md-6">
            <label class="form-label">Nombre de usuario</label>
            <input type="text" class="form-control"
                   th:field="*{nickName}" required>
            <div class="text-danger small"
                 th:if="${#fields.hasErrors('nickName')}"
                 th:errors="*{nickName}">error
            </div>
          </div>

          <!-- Dirección -->
          <div class="col-12 col-md-6">
            <label class="form-label">Dirección</label>
            <input type="text" class="form-control"
                   th:field="*{address}">
            <div class="text-danger small"
                 th:if="${#fields.hasErrors('address')}"
                 th:errors="*{address}">error
            </div>
          </div>

          <!-- Código postal -->
          <div class="col-12 col-md-6">
            <label class="form-label">Código postal</label>
            <input type="text" class="form-control"
                   th:field="*{postalCode}">
            <div class="text-danger small"
                 th:if="${#fields.hasErrors('postalCode')}"
                 th:errors="*{postalCode}">error
            </div>
          </div>

          <!-- País -->
          <div class="col-12 col-md-6">
            <label class="form-label">País</label>
            <input type="text" class="form-control"
                   th:field="*{country}">
            <div class="text-danger small"
                 th:if="${#fields.hasErrors('country')}"
                 th:errors="*{country}">error
            </div>
          </div>

        </div>

        <!-- Botones -->
        <div class="mt-4 d-flex justify-content-between">
          <a href="/profile" class="btn btn-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary">
            Guardar cambios
          </button>
        </div>

      </form>

    </div>
  </div>

</div>

<footer th:insert="~{fragments :: footer}"></footer>

<div th:insert="~{fragments :: toast}"></div>

</body>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/toast.js}"></script>
</html>
