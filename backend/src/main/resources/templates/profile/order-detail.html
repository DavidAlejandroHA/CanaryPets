<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de pedidos</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<div class="container py-4">

  <h2 class="mb-3">Pedido #<span th:text="${order.id}"></span></h2>

  <!-- INFO GENERAL -->
  <div class="card mb-4 shadow-sm">
    <div class="card-body">

      <p>
        <strong>Fecha:</strong>
        <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
      </p>

      <p>
        <strong>Estado:</strong>
        <span class="badge"
              th:text="${order.status}"
              th:classappend="
                        ${order.status == 'PENDING'} ? ' bg-warning text-dark' :
                        (${order.status == 'COMPLETED'} ? ' bg-success' :
                        ' bg-secondary')">
                </span>
      </p>

      <p>
        <strong>Total:</strong>
        <span th:text="${order.orderTotal + ' €'}"></span>
      </p>

    </div>
  </div>

  <!-- DIRECCIÓN -->
  <div class="card mb-4 shadow-sm">
    <div class="card-body">

      <h5>Dirección de envío</h5>

      <p class="mb-1" th:text="${order.nombre + ' ' + order.apellidos}"></p>
      <p class="mb-1" th:text="${order.direccionEnvio}"></p>
      <p class="mb-1" th:text="${order.municipio + ', ' + order.provincia}"></p>
      <p class="mb-0" th:text="${order.codigoPostal}"></p>

    </div>
  </div>

  <!-- PRODUCTOS -->
  <div class="card shadow-sm">
    <div class="card-body">

      <h5 class="mb-3">Productos</h5>

      <div th:each="item : ${order.items}" class="border-bottom py-3">

        <div class="d-flex align-items-center gap-3">

          <!-- Imagen -->
          <img th:src="@{'/images/' + ${item.product.imageUrl}}"
               style="width: 70px; height: 70px; object-fit: cover;">

          <!-- Info -->
          <div class="flex-grow-1">
            <div class="fw-semibold"
                 th:text="${item.product.name}"></div>

            <small class="text-muted">
              Cantidad: <span th:text="${item.quantity}"></span>
            </small>
          </div>

          <!-- Precio -->
          <div class="text-end">
            <div th:text="${item.priceAtPurchase + ' €'}"></div>
            <small class="text-muted">
              Total:
              <span th:text="${item.priceAtPurchase * item.quantity + ' €'}"></span>
            </small>
          </div>

        </div>

      </div>

    </div>
  </div>

  <!-- BOTÓN -->
  <div class="mt-4">
    <a href="/profile/orders" class="btn btn-outline-secondary">
      ← Volver a pedidos
    </a>
  </div>

</div>

</body>
</html>
