<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de pedidos</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<div class="container py-4">

  <h2 class="mb-4">Mis pedidos</h2>

  <div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
  </div>

  <!-- SIN PEDIDOS -->
  <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">
    No has realizado ningún pedido todavía.
  </div>

  <!-- 📱 MOBILE (cards) -->
  <div class="d-md-none">

    <div th:each="order : ${ordersPage.content}" class="card mb-3 shadow-sm">

      <div class="card-body">

        <h6 class="card-title">
          Pedido #<span th:text="${order.id}"></span>
        </h6>

        <p class="mb-1">
          <strong>Fecha:</strong>
          <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy')}"></span>
        </p>

        <p class="mb-1">
          <strong>Total:</strong>
          <span th:text="${order.orderTotal + ' €'}"></span>
        </p>

        <p class="mb-2">
          <strong>Estado:</strong>
          <span class="badge"
                th:text="${order.status}"
                th:classappend="
                            ${order.status == 'PENDING'} ? ' bg-warning text-dark' :
                            (${order.status == 'COMPLETED'} ? ' bg-success' :
                            ' bg-secondary')">
                    </span>
        </p>

        <a th:href="@{/profile/orders/{id}(id=${order.id})}"
           class="btn btn-sm btn-outline-primary">
          Ver detalle
        </a>

      </div>
    </div>
  </div>

  <!-- 💻 DESKTOP (tabla) -->
  <div class="table-responsive d-none d-md-block">

    <table class="table table-hover align-middle">

      <thead class="table-light">
      <tr>
        <th>ID</th>
        <th>Fecha</th>
        <th>Total</th>
        <th>Estado</th>
        <th></th>
      </tr>
      </thead>

      <tbody>

      <tr th:each="order : ${ordersPage.content}">

        <td th:text="${order.id}"></td>

        <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy')}"></td>

        <td th:text="${order.orderTotal + ' €'}"></td>

        <td>
                    <span class="badge"
                          th:text="${order.status}"
                          th:classappend="
                            ${order.status == 'PENDING'} ? ' bg-warning text-dark' :
                            (${order.status == 'COMPLETED'} ? ' bg-success' :
                            ' bg-secondary')">
                    </span>
        </td>

        <td>
          <a th:href="@{/profile/orders/{id}(id=${order.id})}"
             class="btn btn-sm btn-outline-primary">
            Ver
          </a>
        </td>

      </tr>

      </tbody>
    </table>
  </div>

  <!--Paginación-->
  <div th:if="${ordersPage.totalPages > 1}" class="mt-4">

    <!-- Info UX -->
    <p class="text-center text-muted">
      Página <span th:text="${ordersPage.number + 1}"></span>
      de <span th:text="${ordersPage.totalPages}"></span>
    </p>

    <nav>
      <ul class="pagination justify-content-center flex-wrap">

        <li class="page-item" th:classappend="${ordersPage.first} ? 'disabled'">
          <a class="page-link"
             th:href="@{/profile/orders(page=0, size=${ordersPage.size})}">
            Primera
          </a>
        </li>

        <!-- ⬅ PREV -->
        <li class="page-item"
            th:classappend="${ordersPage.first} ? 'disabled'">
          <a class="page-link"
             th:href="@{/profile/orders(
                        page=${ordersPage.number - 1},
                        size=${ordersPage.size}
                   )}">
            Anterior
          </a>
        </li>

        <li class="page-item"
            th:if="${ordersPage.number > 2}">
          <span class="page-link">...</span>
        </li>

        <!-- 🔢 NÚMEROS -->
        <li class="page-item"
            th:each="i : ${#numbers.sequence(
                T(java.lang.Math).max(0, ordersPage.number - 2),
                T(java.lang.Math).min(ordersPage.totalPages - 1, ordersPage.number + 2)
            )}"
            th:classappend="${i == ordersPage.number} ? 'active'">

          <a class="page-link"
             th:href="@{/profile/orders(page=${i}, size=${ordersPage.size})}"
             th:text="${i + 1}">
          </a>
        </li>

        <li class="page-item"
            th:if="${ordersPage.number < ordersPage.totalPages - 3}">
          <span class="page-link">...</span>
        </li>

        <!-- ➡ NEXT -->
        <li class="page-item"
            th:classappend="${ordersPage.last} ? 'disabled'">
          <a class="page-link"
             th:href="@{/profile/orders(
                        page=${ordersPage.number + 1},
                        size=${ordersPage.size}
                   )}">
            Siguiente
          </a>
        </li>

        <li class="page-item" th:classappend="${ordersPage.last} ? 'disabled'">
          <a class="page-link"
                 th:href="@{/profile/orders(
                page=${ordersPage.totalPages - 1},
                size=${ordersPage.size}
           )}">
            Última
          </a>
        </li>

      </ul>
    </nav>
  </div>

  <div class="d-flex justify-content-center mt-3">
    <span class="pe-2">Nº de pedidos por página:</span>
    <form method="get" th:action="@{/profile/orders}">
      <input type="hidden" name="page" value="0">
      <select name="size" class="form-select form-select-sm w-auto" onchange="this.form.submit()">
        <option th:selected="${ordersPage.size == 5}" value="5">5</option>
        <option th:selected="${ordersPage.size == 10}" value="10">10</option>
        <option th:selected="${ordersPage.size == 20}" value="20">20</option>
      </select>
    </form>
  </div>
</div>

</body>
</html>
