<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Registro - CanaryPets</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta charset="UTF-8">
</head>
<body>

<div class="container mt-5" style="max-width: 600px;">
  <h1 class="text-center mb-4 display-5 fw-semibold">CanaryPets</h1>
  <h2 class="text-center mb-4">Crear cuenta</h2>

  <form th:action="@{/auth/register}" method="post" th:object="${user}">
    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}" />

    <div class="mb-3">
      <label>Email</label>
      <input type="email" th:field="*{email}" class="form-control" required>
      <div class="text-danger" th:errors="*{email}"></div>
    </div>

    <div class="mb-3">
      <label>Contraseña</label>
      <input type="password" th:field="*{password}" class="form-control" required>
      <div class="text-danger" th:errors="*{password}"></div>
    </div>

    <div class="mb-3">
      <label>Nombre de usuario</label>
      <input type="text" th:field="*{nickName}" class="form-control" required>
      <div class="text-danger" th:errors="*{nickName}"></div>
    </div>

    <div class="mb-3">
      <label>Dirección</label>
      <input type="text" th:field="*{address}" class="form-control">
      <div class="text-danger" th:errors="*{address}"></div>
    </div>

    <div class="mb-3">
      <label>Código Postal</label>
      <input type="text" th:field="*{postalCode}" class="form-control" required>
      <div class="text-danger" th:errors="*{postalCode}"></div>
    </div>

    <div class="mb-3">
      <label>País</label>
      <input type="text" th:field="*{country}" class="form-control" required>
      <div class="text-danger" th:errors="*{country}"></div>
    </div>

    <div class="d-flex justify-content-between mt-4">
      <button type="button" onclick="history.back()" class="btn btn-secondary">
        Volver atrás
      </button>

      <button type="submit" class="btn btn-primary">
        Registrarse
      </button>
    </div>

  </form>

</div>

</body>
</html>
