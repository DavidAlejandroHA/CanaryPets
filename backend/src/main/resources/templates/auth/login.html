<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - CanaryPets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
</head>
<body>

<div class="container mt-5" style="max-width: 500px;">
    <h1 class="text-center mb-4 display-5 fw-semibold">CanaryPets</h1>
    <h2 class="text-center mb-4">Iniciar sesión</h2>

    <form th:action="@{/auth/login}" method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Contraseña</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <!--Token CSRF que Spring Security usa para proteger formularios-->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <!-- Error -->
        <div th:if="${param.error}" class="alert alert-danger">
            Email o contraseña incorrectos
        </div>

        <!-- Logout -->
        <div th:if="${param.logout}" class="alert alert-success">
            Has cerrado sesión correctamente
        </div>

        <div class="d-flex justify-content-between mt-4">
            <a th:href="@{/auth/register}" class="btn btn-secondary">Registrarse</a>
            <button type="submit" class="btn btn-primary">Entrar</button>
        </div>

    </form>

    <div class="mt-3 text-center">
        <button onclick="history.back()" class="btn btn-link">← Volver atrás</button>
    </div>

</div>

</body>
</html>
